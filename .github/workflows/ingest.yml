name: Ingest podcast episodes

on:
  schedule:
    # GitHub Actions schedules run in UTC. 14:15 UTC is 9:15 EST.
    - cron: "15 14 * * *"
  workflow_dispatch:
    inputs:
      max_episodes:
        description: "Maximum new episodes to process"
        required: false
        default: "2"
      transcribe:
        description: "Transcription mode: auto, always, or never"
        required: false
        default: "auto"

permissions:
  contents: write

concurrency:
  group: podcast-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      STR_FEED_URL: "https://feed.podbean.com/strweekly/feed.xml"
      CROSSEXAMINED_FEED_URL: "https://crossexamined.org/category/podcast/feed/"
      MAX_EPISODES_PER_RUN: ${{ github.event.inputs.max_episodes || '2' }}
      TRANSCRIBE: ${{ github.event.inputs.transcribe || 'auto' }}
      ASR_MODEL: ${{ vars.ASR_MODEL || 'gpt-4o-mini-transcribe' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -e .

      - name: Ingest Stand to Reason feed
        run: >
          python -m str_workflow.ingest
          --feed-url "$STR_FEED_URL"
          --out-dir corpus/podcasts/stand-to-reason
          --podcast-id stand-to-reason
          --podcast-title "Stand to Reason Weekly Podcast"
          --podcast-home-url "https://strweekly.podbean.com/"
          --max-new "$MAX_EPISODES_PER_RUN"
          --transcribe "$TRANSCRIBE"

      - name: Ingest CrossExamined feed
        run: >
          python -m str_workflow.ingest
          --feed-url "$CROSSEXAMINED_FEED_URL"
          --out-dir corpus/podcasts/idont-have-enough-faith
          --podcast-id idont-have-enough-faith
          --podcast-title "I Don't Have Enough FAITH to Be an ATHEIST"
          --podcast-home-url "https://crossexamined.org/podcasts/"
          --max-new "$MAX_EPISODES_PER_RUN"
          --transcribe "$TRANSCRIBE"

      - name: Commit corpus updates
        run: |
          if [[ -z "$(git status --porcelain corpus)" ]]; then
            echo "No corpus updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add corpus
          git commit -m "Update podcast corpora"
          git push
