name: Create missing transcript critiques

on:
  workflow_run:
    workflows: ["Ingest podcast episodes"]
    types: [completed]
    branches: [main]
  schedule:
    # Daily recovery sweep in case the event-driven run was missed or failed.
    # 16:15 UTC is 11:15 EST / 12:15 EDT.
    - cron: "15 16 * * *"
  workflow_dispatch:
    inputs:
      max_episodes:
        description: "Maximum missing critiques to create; 0 means all"
        required: false
        default: "0"
      model:
        description: "OpenAI model used for critique generation"
        required: false
        default: "gpt-5.5"

permissions:
  contents: write

concurrency:
  group: critique-generation
  cancel-in-progress: false

jobs:
  critique:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CRITIQUE_MODEL: ${{ github.event.inputs.model || vars.CRITIQUE_MODEL || 'gpt-5.5' }}
      MAX_EPISODES: ${{ github.event.inputs.max_episodes || '0' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Create missing transcript critique pages
        id: generate
        run: >
          python -m str_workflow.critique_batch
          --max-episodes "$MAX_EPISODES"
          --model "$CRITIQUE_MODEL"
          --skip-site-refresh

      - name: Capture critique generation recovery manifest
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/critique-generation-recovery"
          git status --short docs output > "$RUNNER_TEMP/critique-generation-recovery/git-status.txt"
          find docs/episodes -mindepth 2 -maxdepth 2 -name index.html | sort > "$RUNNER_TEMP/critique-generation-recovery/episode-pages.txt"
          find output/critique-drafts -type f 2>/dev/null | sort > "$RUNNER_TEMP/critique-generation-recovery/draft-files.txt" || true

      - name: Upload critique generation recovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critique-generation-recovery-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            ${{ runner.temp }}/critique-generation-recovery/
            output/critique-drafts/
            docs/episodes/

      - name: Refresh public navigation and homepage
        run: >
          python -m str_workflow.site
          --corpus-dir corpus/podcasts
          --docs-dir docs/episodes

      - name: Refresh SEO and discovery files
        run: |
          if [[ -n "$(git status --porcelain docs)" ]]; then
            python tools/build_site_seo.py
          else
            echo "No critique pages changed; SEO refresh is unnecessary."
          fi

      - name: Run full quality suite
        run: pytest

      - name: Commit public critique updates
        run: |
          if [[ -z "$(git status --porcelain docs)" ]]; then
            echo "No critique updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Add transcript critiques"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
